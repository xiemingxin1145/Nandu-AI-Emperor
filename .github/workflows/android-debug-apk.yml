name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log

      - name: Expose errors as annotations
        if: failure()
        run: |
          grep -E "^e: " /tmp/build.log | head -15 | while IFS= read -r line; do
            echo "::error::$line"
          done
          grep -E "error:" /tmp/build.log | grep -v "^e: " | head -5 | while IFS= read -r line; do
            echo "::warning::$line"
          done

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-V0.3-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
