name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1

      - name: Show errors if failed
        if: failure()
        run: |
          echo "===KOTLIN ERRORS==="
          find . -name "*.txt" -path "*/build/reports/*" -exec cat {} \; 2>/dev/null || true
          find . -name "*.log" -path "*/build/*" -exec grep -l "error:" {} \; 2>/dev/null || true

      - name: Write error summary
        if: failure()
        run: |
          ./gradlew assembleDebug 2>&1 | grep -E "^.*error:|^.*Error:|unresolved reference|expecting" > /tmp/errors.txt || true
          echo "=== TOP ERRORS ===" >> $GITHUB_STEP_SUMMARY
          cat /tmp/errors.txt >> $GITHUB_STEP_SUMMARY || echo "no errors captured" >> $GITHUB_STEP_SUMMARY

      - name: List APK
        if: success()
        run: find app/build/outputs -name "*.apk"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-ai-emperor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
