name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          if ! ./gradlew assembleDebug 2>build_error.txt; then
            echo "BUILD FAILED - error report:"
            cat build_error.txt | grep -E "error:|Error |unresolved|Unresolved|expecting|None of the" | head -40
            echo "---LAST 50---"
            tail -50 build_error.txt
            # 把错误写进仓库
            git config user.email "ci@nandu.dev"
            git config user.name "CI Bot"
            cp build_error.txt last_build_error.txt
            git add last_build_error.txt
            git commit -m "ci: build error report [skip ci]" || true
            git push || true
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-ai-emperor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
