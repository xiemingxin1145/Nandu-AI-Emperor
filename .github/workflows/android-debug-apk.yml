name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log

      - name: Write error to repo file
        if: failure()
        run: |
          tail -80 /tmp/build.log > build-error-latest.txt
          git config user.email "ci@nandu.dev"
          git config user.name "CI-Bot"
          git add build-error-latest.txt
          git diff --cached --quiet || git commit -m "ci: error log [skip ci]"
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }} HEAD:main || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-V0.3-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
