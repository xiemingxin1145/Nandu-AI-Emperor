name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log || {
            echo "=== KOTLIN ERRORS ==="
            grep -E "^e: |error:|unresolved reference|None of the" /tmp/build.log | head -50
            echo "::error::$(grep -E '^e: ' /tmp/build.log | head -5 | tr '\n' '|')"
            exit 1
          }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-ai-emperor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
