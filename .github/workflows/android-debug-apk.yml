name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log

      - name: Show APK path
        if: success()
        run: |
          echo "APK files:"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Show errors if build failed
        if: failure()
        run: |
          echo "=== BUILD ERRORS ==="
          grep -E "^e: |error:|unresolved reference" /tmp/build.log | head -30 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nandu-V0.3-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
