name: Build 南渡无悔 Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: List APK outputs
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "no apk found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nandu-ai-emperor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
